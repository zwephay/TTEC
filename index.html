<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>မီတာဘေကျသင့်ငွေအားစစ်ဆေးရန်</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #0f172a;
  color: #e2e8f0;
}

.header {
  background: linear-gradient(90deg, #2563eb, #1e40af);
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.input-group {
  display: flex;
  gap: 10px;
  position: relative;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
  font-size: 16px;
}

button {
  padding: 14px 18px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

/* suggestions dropdown */
.suggestions {
  position: absolute;
  top: 55px;
  left: 0;
  right: 0;
  background: #111827;
  border: 1px solid #374151;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 10;
}

.suggestions div {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #1f2937;
}

.suggestions div:hover {
  background: #1f2937;
}

.result {
  margin-top: 25px;
  background: #0b1220;
  padding: 15px;
  border-radius: 12px;
}

.row {
  display: grid;
  grid-template-columns: 140px 1fr;
  padding: 10px;
  border-bottom: 1px solid #1f2937;
}

.label {
  color: #93c5fd;
  font-weight: bold;
}

.loader {
  border: 4px solid #1f2937;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <i class="fa-solid fa-database"></i> မီတာဘေကျသင့်ငွေအားစစ်ဆေးရန်
</div>

<div class="container">
  <div class="card">

    <div class="input-group">
      <input type="text" id="search" placeholder="Enter Code" 
        onkeyup="getSuggestions()" 
        onkeydown="if(event.key==='Enter') searchData()">

      <button onclick="searchData()">
        <i class="fa fa-search"></i>
      </button>

      <div id="suggestions" class="suggestions"></div>
    </div>

    <div id="result"></div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxDFo80ITN_bchsfCCfGuHZ0OiesWFHhae_yveLsEVkjAgpEagxmcR9Ydfo9pwBY2LZRw/exec";


// ✅ SEARCH RESULT
async function searchData() {
  const input = document.getElementById("search").value.trim();
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerHTML = "<p>Please enter code</p>";
    return;
  }

  resultDiv.innerHTML = "<div class='loader'></div>";

  try {
    const url = API_URL + "?code=" + encodeURIComponent(input) + "&t=" + Date.now();

    const res = await fetch(url);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      resultDiv.innerHTML = "<p>No result found</p>";
      return;
    }

    const item = data[0];

    resultDiv.innerHTML = `
      <div class="result">
        <div class="row"><div class="label">ကွန်ပျူတာကုဒ်</div><div>${item.code || ""}</div></div>
        <div class="row"><div class="label">နောက်ဆုံးဖတ်ယူနစ်</div><div>${item.last || ""}</div></div>
        <div class="row"><div class="label">ယခင်ယူနစ်</div><div>${item.old || ""}</div></div>
        <div class="row"><div class="label">ကွာခြားယူနစ်</div><div>${item.diff || ""}</div></div>
        <div class="row"><div class="label">ကျသင့်ငွေ</div><div>${item.cost || ""}</div></div>
        <div class="row"><div class="label">လိုင်းနံပတ်</div><div>${item.line || ""}</div></div>
        <div class="row"><div class="label">အမည်၊လိပ်စာ</div><div>${item.address || ""}</div></div>
      </div>
    `;

  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = "<p style='color:red;'>Error loading data</p>";
  }
}


// ✅ AUTO SUGGEST
async function getSuggestions() {
  const keyword = document.getElementById("search").value.trim();
  const box = document.getElementById("suggestions");

  if (!keyword) {
    box.innerHTML = "";
    return;
  }

  try {
    const url = API_URL + "?suggest=" + encodeURIComponent(keyword) + "&t=" + Date.now();

    const res = await fetch(url);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      box.innerHTML = "";
      return;
    }

    let html = "";

    data.forEach(item => {
      html += `<div onclick="selectCode('${item.code}')">
        ${item.code} - ${item.address}
      </div>`;
    });

    box.innerHTML = html;

  } catch (err) {
    console.error(err);
  }
}


// ✅ select suggestion
function selectCode(code) {
  document.getElementById("search").value = code;
  document.getElementById("suggestions").innerHTML = "";
}
</script>

</body>
</html>
