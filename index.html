<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>မီတာဘေကျသင့်ငွေအားစစ်ဆေးရန်</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f1f5f9;
  color: #111827;
}

.header {
  background: linear-gradient(90deg, #2563eb, #1e40af);
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: white;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #ffffff;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  outline: none;
  font-size: 16px;
}

button {
  padding: 14px 18px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1e40af;
}

.result {
  margin-top: 25px;
  background: #f9fafb;
  padding: 15px;
  border-radius: 12px;
}

.row {
  display: grid;
  grid-template-columns: 200px 1fr;
  padding: 10px;
  border-bottom: 1px solid #e5e7eb;
}

.label {
  color: #2563eb;
  font-weight: bold;
}

.loader {
  border: 4px solid #e5e7eb;
  border-top: 4px solid #2563eb;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* 📱 Mobile Responsive */
@media (max-width: 600px) {

  .container {
    margin: 10px;
    padding: 10px;
  }

  .card {
    padding: 15px;
  }

  .header {
    font-size: 18px;
    padding: 15px;
  }

  .input-group {
    flex-direction: column;
  }

  input, button {
    width: 100%;
  }

  .row {
    grid-template-columns: 1fr;
    gap: 5px;
    background: #ffffff;
    border-radius: 10px;
    margin-bottom: 8px;
    border: 1px solid #e5e7eb;
  }

  .label {
    font-size: 14px;
  }

  .row div:last-child {
    font-size: 15px;
    font-weight: 500;
  }

}
</style>
</head>

<body>

<div class="header">
  <i class="fa-solid fa-database"></i> မီတာဘေကျသင့်ငွေအားစစ်ဆေးရန်
</div>

<div class="container">
  <div class="card">

    <div class="input-group">
      <input type="text" id="search" placeholder="လူကြီးမင်း၏ Code အားရိုက်ထည့်ပေးပါ"
        onkeydown="if(event.key==='Enter') searchData()">

      <button onclick="searchData()">
        <i class="fa fa-search"></i>
      </button>
    </div>

    <div id="result"></div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxBLYQvGT8eDWe1_FarBnw-LVdggBF79S0FgcYSl4V_nYDT-p63ScNl4C60vob4vPmywQ/exec";

// helper row
function row(label, value, isCurrency = false) {
  if (value === 0 || value === "0" || value === null || value === undefined || value === "") {
    return "";
  }

  let displayValue = value;

  if (isCurrency && !isNaN(value)) {
    displayValue = Number(value).toLocaleString() + " ฿";
  }

  return `
    <div class="row">
      <div class="label">${label}</div>
      <div>${displayValue}</div>
    </div>
  `;
}

// search
async function searchData() {
  const input = document.getElementById("search").value.trim();
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerHTML = "<p>Please enter code</p>";
    return;
  }

  resultDiv.innerHTML = "<div class='loader'></div>";

  try {
    const url = API_URL + "?code=" + encodeURIComponent(input) + "&t=" + Date.now();

    const res = await fetch(url);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      resultDiv.innerHTML = "<p>No result found</p>";
      return;
    }

    const item = data[0];

    resultDiv.innerHTML = `
      <div class="result">

        ${row("ကွန်ပျူတာကုဒ်", item.code)}
        ${row("လိုင်းနံပတ်", item.line)}
        ${row("အမည်", item.name)}
        ${row("လိပ်စာ", item.address)}

        ${row("ယခုဖတ်ယူနစ်", item.current_unit)}
        ${row("ယခင်ဖတ်ယူနစ်", item.previous_unit)}
        ${row("သုံးစွဲယူနစ်", item.used_unit)}

        ${row("မြှောက်ကိန်း", item.multiplier)}
        ${row("ယူနစ်နှုန်း", item.unit_price, true)}

        ${row("5% ကျသင့်ငွေ", item.tax_5, true)}
        ${row("ဝန်ဆောင်ခ", item.service_fee, true)}
        ${row("ကြွေးကျန်", item.debt, true)}

        ${row("ကျသင့်ငွေပေါင်း", item.total, true)}
        ${row("မီတာလဲလှယ်ယူနစ်", item.meter_change)}

      </div>
    `;

  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = "<p style='color:red;'>Error loading data</p>";
  }
}
</script>

</body>
</html>
