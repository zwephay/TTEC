<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Customer Lookup</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #0f172a;
  color: #e2e8f0;
}

.header {
  background: linear-gradient(90deg, #2563eb, #1e40af);
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
  font-size: 16px;
}

button {
  padding: 14px 18px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2563eb;
}

.result {
  margin-top: 25px;
  background: #0b1220;
  padding: 15px;
  border-radius: 12px;
}

.row {
  display: grid;
  grid-template-columns: 140px 1fr;
  padding: 10px;
  border-bottom: 1px solid #1f2937;
}

.label {
  color: #93c5fd;
  font-weight: bold;
}

.loader {
  border: 4px solid #1f2937;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <i class="fa-solid fa-database"></i> Smart Customer Lookup
</div>

<div class="container">
  <div class="card">

    <div class="input-group">
      <input type="text" id="search" placeholder="Enter Code or Line" onkeydown="if(event.key==='Enter') searchData()">
      <button onclick="searchData()">
        <i class="fa fa-search"></i>
      </button>
    </div>

    <div id="result"></div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyNU3mpd7YxzS17_PHiOZM4uPggOXEOEyACOLM7xRLrVOaKPy-XDO_-sowWBcLsSJHIKA/exec";

async function searchData() {
  const input = document.getElementById("search").value.trim();
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerHTML = "<p>Please enter a value</p>";
    return;
  }

  resultDiv.innerHTML = "<div class='loader'></div>";

  try {
    let url = "";

    // Decide search type
    if (!isNaN(input)) {
      url = API_URL + "?code=" + encodeURIComponent(input);
    } else {
      url = API_URL + "?line=" + encodeURIComponent(input);
    }

    const res = await fetch(url, { cache: "no-store" });
    const data = await res.json();

    console.log("API RESULT:", data);

    if (!Array.isArray(data) || data.length === 0) {
      resultDiv.innerHTML = "<p>No result found</p>";
      return;
    }

    const item = data[0];

    resultDiv.innerHTML = `
      <div class="result">
        <div class="row"><div class="label"><i class="fa fa-barcode"></i> Code</div><div>${item.code || ""}</div></div>
        <div class="row"><div class="label"><i class="fa fa-signal"></i> Last</div><div>${item.last || ""}</div></div>
        <div class="row"><div class="label"><i class="fa fa-history"></i> Old</div><div>${item.old || ""}</div></div>
        <div class="row"><div class="label"><i class="fa fa-exchange-alt"></i> Diff</div><div>${item.diff || ""}</div></div>
        <div class="row"><div class="label"><i class="fa fa-money-bill"></i> Cost</div><div>${item.cost || ""}</div></div>
        <div class="row"><div class="label"><i class="fa fa-layer-group"></i> Line</div><div>${item.line || ""}</div></div>
        <div class="row"><div class="label"><i class="fa fa-map-marker-alt"></i> Address</div><div>${item.address || ""}</div></div>
      </div>
    `;

  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = "<p style='color:red;'>Server Error</p>";
  }
}
</script>

</body>
</html>
