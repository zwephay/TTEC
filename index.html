<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Customer Lookup</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #0f172a;
  color: #e2e8f0;
}

/* Header */
.header {
  background: linear-gradient(90deg, #2563eb, #1e40af);
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* Container */
.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

/* Card */
.card {
  background: #111827;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Input */
.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
}

/* Button */
button {
  padding: 14px 18px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2563eb;
}

/* Result */
.result {
  margin-top: 20px;
  background: #0b1220;
  padding: 15px;
  border-radius: 12px;
}

/* Row */
.row {
  display: grid;
  grid-template-columns: 120px 1fr;
  padding: 8px;
  border-bottom: 1px solid #1f2937;
}

.label {
  color: #93c5fd;
  font-weight: bold;
}

/* Loader */
.loader {
  border: 4px solid #1f2937;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <i class="fa-solid fa-database"></i> Smart Customer Lookup
</div>

<div class="container">
  <div class="card">

    <div class="input-group">
      <input type="text" id="search" placeholder="Enter Code or Line">
      <button onclick="searchData()">
        <i class="fa fa-search"></i>
      </button>
    </div>

    <div id="result"></div>

  </div>
</div>

<script>
async function searchData() {
  const input = document.getElementById("search").value.trim();
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerHTML = "<p>Please enter a value</p>";
    return;
  }

  resultDiv.innerHTML = "<div class='loader'></div>";

  try {

    // Decide search type
    let url = "https://script.google.com/macros/s/AKfycbyNU3mpd7YxzS17_PHiOZM4uPggOXEOEyACOLM7xRLrVOaKPy-XDO_-sowWBcLsSJHIKA/exec";

    // simple logic: if numeric → code, else → line
    if (!isNaN(input)) {
      url += "?code=" + encodeURIComponent(input);
    } else {
      url += "?line=" + encodeURIComponent(input);
    }

    const res = await fetch(url);
    const data = await res.json();

    if (!data || data.length === 0) {
      resultDiv.innerHTML = "<p>No result found</p>";
      return;
    }

    // Only first row
    const item = data[0];

    resultDiv.innerHTML = `
      <div class="result">
        <div class="row"><div class="label">Code</div><div>${item.code || ""}</div></div>
        <div class="row"><div class="label">Last Reading</div><div>${item.last || ""}</div></div>
        <div class="row"><div class="label">Old Reading</div><div>${item.old || ""}</div></div>
        <div class="row"><div class="label">Different</div><div>${item.diff || ""}</div></div>
        <div class="row"><div class="label">Cost</div><div>${item.cost || ""}</div></div>
        <div class="row"><div class="label">Line</div><div>${item.line || ""}</div></div>
        <div class="row"><div class="label">Address</div><div>${item.address || ""}</div></div>
      </div>
    `;

  } catch (err) {
    resultDiv.innerHTML = "<p style='color:red;'>Error loading data</p>";
    console.error(err);
  }
}
</script>

</body>
</html>
